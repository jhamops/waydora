# Starship prompt — Tokyo Night palette
# Inspired by Omarchy's clean aesthetic

"$schema" = 'https://starship.rs/config-schema.json'

format = """
[](color_bg1)\
$os\
$username\
[](bg:color_bg2 fg:color_bg1)\
$directory\
[](bg:color_bg3 fg:color_bg2)\
$git_branch\
$git_status\
[](bg:color_bg4 fg:color_bg3)\
$python\
$nodejs\
$rust\
$golang\
[](fg:color_bg4)\
$fill\
$cmd_duration\
$time\
$line_break\
$character"""

palette = "tokyo_night"

[palettes.tokyo_night]
color_fg0    = "#c0caf5"
color_bg1    = "#414868"
color_bg2    = "#283457"
color_bg3    = "#1d3b6e"
color_bg4    = "#16161e"
color_blue   = "#7aa2f7"
color_cyan   = "#7dcfff"
color_green  = "#9ece6a"
color_yellow = "#e0af68"
color_red    = "#f7768e"
color_purple = "#bb9af7"
color_gray   = "#565f89"

[os]
disabled = false
style = "fg:color_fg0 bg:color_bg1"

[os.symbols]
Linux   = "󰌽 "
Fedora  = " "
Ubuntu  = " "

[username]
show_always = true
style_user  = "fg:color_fg0 bg:color_bg1"
style_root  = "fg:color_red bg:color_bg1 bold"
format      = "[ $user ]($style)"

[directory]
style            = "fg:color_cyan bg:color_bg2 bold"
format           = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music"     = "󰝚 "
"Pictures"  = " "
"~"         = " "

[git_branch]
symbol = " "
style  = "fg:color_green bg:color_bg3"
format = "[ $symbol$branch ]($style)"

[git_status]
style  = "fg:color_yellow bg:color_bg3"
format = "[$all_status$ahead_behind ]($style)"

[python]
symbol = " "
style  = "fg:color_yellow bg:color_bg4"
format = "[ $symbol($version) ]($style)"

[nodejs]
symbol = " "
style  = "fg:color_green bg:color_bg4"
format = "[ $symbol($version) ]($style)"

[rust]
symbol = " "
style  = "fg:color_red bg:color_bg4"
format = "[ $symbol($version) ]($style)"

[golang]
symbol = " "
style  = "fg:color_cyan bg:color_bg4"
format = "[ $symbol($version) ]($style)"

[fill]
symbol = " "

[cmd_duration]
min_time           = 2000
style              = "fg:color_gray"
format             = "[$duration ]($style)"
show_milliseconds  = false

[time]
disabled    = false
time_format = "%H:%M"
style       = "fg:color_gray"
format      = "[ $time ]($style)"

[character]
success_symbol = "[❯](bold color_green)"
error_symbol   = "[❯](bold color_red)"
vimcmd_symbol  = "[❮](bold color_blue)"
