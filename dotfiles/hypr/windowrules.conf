# Window rules — workspace assignments + floating overrides
# Workspace layout:
#  1: Browser / AWS Study  2: Documentation  3: Terminal
#  4: Communication        5: Multimedia     6: Gaming

# Workspace declarations (persistent = survives closing all windows)
workspace = 1, name:Browser,  persistent:true
workspace = 2, name:Docs,     persistent:true
workspace = 3, name:Terminal, persistent:true
workspace = 4, name:Comms,    persistent:true
workspace = 5, name:Media,    persistent:true
workspace = 6, name:Gaming,   persistent:true

# ── Workspace 1: Browser / AWS Study ─────────────────────────────────────────
windowrule = match:class ^(chromium-browser)$, workspace 1 silent
windowrule = match:class ^(chromium)$, workspace 1 silent
windowrule = match:class ^(org\.mozilla\.firefox)$, workspace 1 silent

# ── Workspace 2: Documentation ────────────────────────────────────────────────
windowrule = match:class ^(obsidian)$, workspace 2 silent
windowrule = match:class ^(evince)$, workspace 2 silent
windowrule = match:class ^(libreoffice.*)$, workspace 2 silent
windowrule = match:class ^(okular)$, workspace 2 silent

# ── Workspace 3: Terminal ──────────────────────────────────────────────────────
# kitty abre en el workspace actual (no forzado al WS3)

# ── Workspace 4: Communication ────────────────────────────────────────────────
windowrule = match:class ^(signal)$, workspace 4 silent
windowrule = match:class ^(telegram-desktop)$, workspace 4 silent
windowrule = match:class ^(discord)$, workspace 4 silent
windowrule = match:class ^(slack)$, workspace 4 silent

# ── Workspace 5: Multimedia ───────────────────────────────────────────────────
windowrule = match:class ^(mpv)$, workspace 5 silent
windowrule = match:class ^(spotify)$, workspace 5 silent
windowrule = match:class ^(vlc)$, workspace 5 silent
windowrule = match:class ^(obs)$, workspace 5 silent
windowrule = match:class ^(kdenlive)$, workspace 5 silent

# ── Workspace 6: Gaming ────────────────────────────────────────────────────────
windowrule = match:class ^(steam)$, workspace 6 silent
windowrule = match:class ^(steam_app_.*)$, workspace 6 silent
windowrule = match:class ^(gamescope)$, workspace 6 silent
windowrule = match:class ^(dota2)$, workspace 6 silent
windowrule = match:class ^(LiesOfP.*)$, workspace 6 silent
# Full screen + no gaps for gaming
windowrule = match:class ^(steam_app_.*)$, fullscreen true
windowrule = match:class ^(dota2)$, fullscreen true

# ── Floating windows ──────────────────────────────────────────────────────────
windowrule = match:class ^(keybindings)$, float true
windowrule = match:class ^(keybindings)$, size 700 700
windowrule = match:class ^(keybindings)$, center 1
windowrule = match:class ^(pavucontrol)$, float true
windowrule = match:class ^(nm-connection-editor)$, float true
windowrule = match:class ^(gnome-calculator)$, float true
windowrule = match:class ^(xdg-desktop-portal-gtk)$, float true
windowrule = match:title ^(Picture-in-Picture)$, float true
windowrule = match:title ^(Steam - Self Updater)$, float true
windowrule = match:title ^(Friends List)$, float true

# ── Opacity ────────────────────────────────────────────────────────────────────
windowrule = match:class ^(kitty)$,      opacity 0.92 0.85
windowrule = match:class ^(steam_app_.*)$, opacity 1.0 1.0
windowrule = match:class ^(dota2)$, opacity 1.0 1.0
