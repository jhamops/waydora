# Autostart programs — launched when Hyprland starts

# Export Hyprland env vars to systemd so services like xdg-desktop-portal work
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=Hyprland HYPRLAND_INSTANCE_SIGNATURE
exec-once = systemctl --user start graphical-session.target

# Notification daemon
exec-once = mako

# Idle + lock screen
exec-once = hypridle

# Status bar
exec-once = waybar

# Wallpaper — rotación cada 30 min entre ~/Pictures/Wallpapers/
exec-once = swww-daemon
exec-once = wallpaper-cycle.sh

# Polkit agent (needed for sudo GUI dialogs)
exec-once = /usr/libexec/polkit-gnome-authentication-agent-1

# Clipboard manager
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# GNOME keyring (for passwords, SSH keys)
exec-once = gnome-keyring-daemon --start --components=secrets,ssh

# XDG desktop portals (backends first, then main portal frontend)
exec-once = sleep 1 && /usr/libexec/xdg-desktop-portal-hyprland
exec-once = sleep 1 && /usr/libexec/xdg-desktop-portal-gtk
exec-once = sleep 2 && /usr/libexec/xdg-desktop-portal

# Apply GTK theme
exec-once = gsettings set org.gnome.desktop.interface gtk-theme "Tokyonight-Dark-B"
exec-once = gsettings set org.gnome.desktop.interface icon-theme "Papirus-Dark"
exec-once = gsettings set org.gnome.desktop.interface cursor-theme "Adwaita"
exec-once = gsettings set org.gnome.desktop.interface cursor-size 24
exec-once = gsettings set org.gnome.desktop.interface font-name "JetBrainsMono Nerd Font 11"
exec-once = gsettings set org.gnome.desktop.interface color-scheme "prefer-dark"
