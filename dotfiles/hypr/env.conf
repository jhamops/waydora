# NVIDIA RTX 4050 — Wayland environment variables
# Required for flicker-free rendering on Wayland with NVIDIA proprietary driver

# Core Wayland/GBM backend
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = LIBVA_DRIVER_NAME,nvidia

# Explicit sync — WLR_DRM_NO_ATOMIC removed (wlroots-only; Hyprland uses Aquamarine since 0.41)

# VA-API hardware decode (video playback, obs, mpv)
env = NVD_BACKEND,direct
env = LIBVA_DRIVERS_PATH,/usr/lib64/dri

# Wayland for Electron apps (Chromium, Obsidian, VS Code)
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = NIXOS_OZONE_WL,1

# Wayland for Mozilla (Firefox/Thunderbird)
env = MOZ_ENABLE_WAYLAND,1

# Qt Wayland
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1

# SDL2 (many games, including Dota 2)
env = SDL_VIDEODRIVER,wayland

# Cursor
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Adwaita

# XDG session
env = XDG_SESSION_TYPE,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland

# Default apps
env = TERMINAL,kitty
env = EDITOR,nvim
env = BROWSER,chromium-browser

# If cursor is invisible after boot, uncomment this line:
# cursor { no_hardware_cursors = true }
