# Visual settings — Omarchy Tokyo Night aesthetic
# Key values from Omarchy: no rounding, 2px cyan-green gradient borders,
# inner gap 5, outer gap 10, blur on, shadows on.

general {
  gaps_in = 5
  gaps_out = 10
  border_size = 2

  # Active window: cyan → green gradient (Omarchy signature)
  col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
  col.inactive_border = rgba(595959aa)

  layout = dwindle
  resize_on_border = true
  extend_border_grab_area = 10
}

decoration {
  # No rounding — flat, sharp corners (Omarchy default)
  rounding = 0

  active_opacity = 1.0
  inactive_opacity = 0.95
  fullscreen_opacity = 1.0

  shadow {
    enabled = true
    range = 4
    render_power = 3
    color = rgba(1a1a1aee)
    color_inactive = rgba(1a1a1a88)
    offset = 0 2
  }

  blur {
    enabled = true
    size = 2
    passes = 2
    brightness = 0.60
    contrast = 0.75
    noise = 0.02
    xray = false
    special = true
  }
}

animations {
  enabled = true

  bezier = ease, 0.25, 0.1, 0.25, 1.0
  bezier = easeOut, 0.0, 0.0, 0.2, 1.0
  bezier = overshot, 0.05, 0.9, 0.1, 1.05

  animation = windows, 1, 3.79, overshot, slide
  animation = windowsOut, 1, 3.79, ease, slide
  animation = windowsMove, 1, 3.5, easeOut, slide
  animation = border, 1, 5, default
  animation = borderangle, 1, 8, default
  animation = fade, 1, 4, ease
  animation = layers, 1, 3.81, easeOut, slide
  animation = specialWorkspace, 1, 3, ease, slidevert

  # Workspace transitions disabled (Omarchy default)
  animation = workspaces, 0
}

dwindle {
  preserve_split = true
  smart_resizing = true
}

master {
  new_status = master
}

group {
  groupbar {
    height = 22
    font_family = JetBrainsMono Nerd Font
    font_size = 12
    text_color = rgba(ffffffff)
    col.active = rgba(00000040)
    col.inactive = rgba(00000020)
    gaps_in = 5
    gaps_out = 0
  }
}
