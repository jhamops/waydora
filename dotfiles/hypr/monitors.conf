# Monitor configuration
# Edit this file to match your display.
# Format: monitor=NAME,RESOLUTION@REFRESHRATE,POSITION,SCALE
#
# Find your monitor name: hyprctl monitors
# Examples:
#   monitor=eDP-1,1920x1080@144,0x0,1         # 1080p 144Hz laptop screen
#   monitor=eDP-1,2560x1440@165,0x0,1.25      # 1440p 165Hz with scaling
#   monitor=HDMI-A-1,1920x1080@60,1920x0,1    # external monitor on the right
#
# RTX 4050 handles up to 4K@120Hz on single display via HDMI 2.1

# Default: auto-detect preferred resolution and refresh rate
    monitor=eDP-1,1920x1080@144,0x0,1

# Workspace-to-monitor assignments (adjust if you have multiple monitors)
# workspace = 1, monitor:eDP-1
# workspace = 6, monitor:HDMI-A-1  # gaming on external
