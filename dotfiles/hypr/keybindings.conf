# Keybindings — Omarchy-inspired, adapted for 6-workspace layout
# SUPER = Windows/Meta key

$terminal  = kitty
$browser   = chromium-browser
$filemanager = nautilus
$launcher  = wofi --show drun --prompt "Launch" --insensitive
$editor    = kitty -e nvim
$music     = kitty -e cmus

# ── Session ────────────────────────────────────────────────────────────────────
bind = SUPER SHIFT, Q, exit,
bind = SUPER, L, exec, hyprlock
bind = SUPER SHIFT, R, exec, hyprctl reload
bind = SUPER, slash,  exec, ~/.config/hypr/scripts/toggle-keybindings.sh

# ── Applications ──────────────────────────────────────────────────────────────
bind = SUPER, RETURN,       exec, $terminal
bind = SUPER ALT, RETURN,   exec, $terminal -e tmux
bind = SUPER SHIFT, RETURN, exec, $browser
bind = SUPER SHIFT, F,      exec, $filemanager
bind = SUPER, D,            exec, $launcher
bind = SUPER SHIFT, N,      exec, $editor
bind = SUPER SHIFT, M,      exec, $music

# Screenshot (grim + slurp)
bind = ,           Print,  exec, grim ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png && notify-send "Screenshot" "Pantalla completa guardada en ~/Pictures"
bind = SHIFT,      Print,  exec, grim -g "$(slurp)" ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png && notify-send "Screenshot" "Selección guardada en ~/Pictures"
bind = CTRL,       Print,  exec, grim -g "$(slurp)" - | wl-copy && notify-send "Screenshot" "Selección copiada al portapapeles"
bind = SUPER SHIFT, S,     exec, grim -g "$(slurp)" - | wl-copy && notify-send "Screenshot" "Selección copiada al portapapeles"

# Clipboard history
bind = SUPER, V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy

# ── Window management ─────────────────────────────────────────────────────────
bind = SUPER, Q,          killactive,
bind = SUPER, F,          fullscreen, 0
bind = SUPER ALT, F,      fullscreen, 1
bind = SUPER SHIFT, SPACE, togglefloating,
bind = SUPER, P,          pseudo,
bind = SUPER, T,          layoutmsg, togglesplit

# Focus (vim-style — SUPER+L omitted: conflicts with hyprlock bind above)
bind = SUPER, H, movefocus, l
bind = SUPER, K, movefocus, u
bind = SUPER, J, movefocus, d

# Also arrow keys
bind = SUPER, left,  movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up,    movefocus, u
bind = SUPER, down,  movefocus, d

# Move windows
bind = SUPER SHIFT, H, movewindow, l
bind = SUPER SHIFT, L, movewindow, r
bind = SUPER SHIFT, K, movewindow, u
bind = SUPER SHIFT, J, movewindow, d

# Resize windows
binde = SUPER CTRL, H, resizeactive, -40 0
binde = SUPER CTRL, L, resizeactive, 40 0
binde = SUPER CTRL, K, resizeactive, 0 -40
binde = SUPER CTRL, J, resizeactive, 0 40

# ── 6 Workspaces ──────────────────────────────────────────────────────────────
# 1: Browser / AWS Study   2: Documentation   3: Terminal
# 4: Communication         5: Multimedia      6: Gaming

bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6

# Move window to workspace
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6

# Move window AND follow it
bind = SUPER ALT, 1, movetoworkspacesilent, 1
bind = SUPER ALT, 2, movetoworkspacesilent, 2
bind = SUPER ALT, 3, movetoworkspacesilent, 3
bind = SUPER ALT, 4, movetoworkspacesilent, 4
bind = SUPER ALT, 5, movetoworkspacesilent, 5
bind = SUPER ALT, 6, movetoworkspacesilent, 6

# Scroll through workspaces
bind = SUPER, mouse_down, workspace, e+1
bind = SUPER, mouse_up,   workspace, e-1
bind = SUPER, TAB,        workspace, e+1
bind = SUPER SHIFT, TAB,  workspace, e-1

# ── Media keys ────────────────────────────────────────────────────────────────
bindel = , XF86AudioRaiseVolume, exec, pamixer -i 5
bindel = , XF86AudioLowerVolume, exec, pamixer -d 5
bindl  = , XF86AudioMute,        exec, pamixer -t
bindl  = , XF86AudioPlay,        exec, playerctl play-pause
bindl  = , XF86AudioPrev,        exec, playerctl previous
bindl  = , XF86AudioNext,        exec, playerctl next

# Brightness (laptop backlight)
bindel = , XF86MonBrightnessUp,   exec, brightnessctl set +5%
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# ── Mouse bindings ─────────────────────────────────────────────────────────────
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow
