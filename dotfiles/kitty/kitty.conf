# Kitty — Tokyo Night, matching Omarchy's Alacritty setup
# Font: JetBrains Mono Nerd Font 9pt, padding 14px (Omarchy values)

# ── Font ───────────────────────────────────────────────────────────────────────
font_family      JetBrainsMono Nerd Font Regular
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic
bold_italic_font JetBrainsMono Nerd Font Bold Italic
font_size        9.0

# ── Window ─────────────────────────────────────────────────────────────────────
window_padding_width  14
window_padding_height 14
hide_window_decorations yes
background_opacity 0.92
dynamic_background_color no
remember_window_size   yes
initial_window_width   800
initial_window_height  500

# ── Cursor ─────────────────────────────────────────────────────────────────────
cursor_shape          block
cursor_blink_interval 0

# ── Scrollback ────────────────────────────────────────────────────────────────
scrollback_lines 10000

# ── Tab bar ───────────────────────────────────────────────────────────────────
tab_bar_style               powerline
tab_powerline_style         round
tab_bar_min_tabs            2
tab_title_template          "{index}: {title[:20]}"
active_tab_font_style       bold
inactive_tab_font_style     normal

# ── Tokyo Night Colorscheme ───────────────────────────────────────────────────
background             #1a1b26
foreground             #c0caf5
selection_background   #283457
selection_foreground   #c0caf5
cursor                 #c0caf5
cursor_text_color      #1a1b26
url_color              #9ece6a

# Normal colors
color0  #15161e
color1  #f7768e
color2  #9ece6a
color3  #e0af68
color4  #7aa2f7
color5  #bb9af7
color6  #7dcfff
color7  #a9b1d6

# Bright colors
color8  #414868
color9  #f7768e
color10 #9ece6a
color11 #e0af68
color12 #7aa2f7
color13 #bb9af7
color14 #7dcfff
color15 #c0caf5

# Tab bar
active_tab_background   #7aa2f7
active_tab_foreground   #1a1b26
inactive_tab_background #1a1b26
inactive_tab_foreground #565f89
tab_bar_background      #16161e

# ── Clipboard ─────────────────────────────────────────────────────────────────
clipboard_control write-clipboard write-primary read-clipboard-ask read-primary-ask

# ── URL handling ──────────────────────────────────────────────────────────────
open_url_with  chromium-browser
url_prefixes   file ftp ftps gemini git http https irc ircs kitty mailto news sftp ssh

# ── Shell ──────────────────────────────────────────────────────────────────────
shell      /usr/bin/fish
editor     nvim
term       xterm-256color
